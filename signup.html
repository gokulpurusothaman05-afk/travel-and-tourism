<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Travel</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- Bootstrap Select -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/css/bootstrap-select.min.css">
  <!-- Magnific Popup CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
  <!-- jQuery UI CSS -->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <!-- noUiSlider CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
  <!-- Owl Carousel CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
  <!-- Slick CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
  <!-- Tiny Slider CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/tiny-slider.css">
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="section-dark">

  <!-- Preloader -->
  <div id="preloader">
    <div class="loader-logo">STACKLY</div>
    <div class="loader-spinner"></div>
  </div>

  <!-- Injected Header -->
  <div id="header-container"></div>

  <!-- CONTENT SECTIONS (10 Sections) -->

  <!-- Section 1: Hero Header -->
  <section id="section-signup-hero" class="hero-slider-section jarallax" style="background-image: url('assets/images/hero_bg.webp'); height: 45vh;">
    <div class="container h-100 d-flex align-items-center">
      <div class="hero-content" data-aos="fade-up">
        <span class="section-subtitle">Account Portal</span>
        <h1 class="text-white h1 font-serif display-4">Register Account</h1>
      </div>
    </div>
  </section>

  <!-- Section 2: Signup Form Container -->
  <section id="section-signup-forms" class="section-dark">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="glass-card" data-aos="fade-up">
            <h3 class="text-white text-center mb-4">Create Membership</h3>
            
            <form id="signupForm" action="login.html" method="GET">
              <div class="mb-3">
                <label class="form-label text-secondary small">Full Name</label>
                <input type="text" class="form-control bg-transparent border-secondary text-white" required name="fullname" placeholder="John Doe">
              </div>
              <div class="mb-3">
                <label class="form-label text-secondary small">Email Address</label>
                <input type="email" class="form-control bg-transparent border-secondary text-white" required name="email" placeholder="name@domain.com">
              </div>
              <div class="mb-3">
                <label class="form-label text-secondary small">Password</label>
                <input type="password" class="form-control bg-transparent border-secondary text-white" required name="password" id="password" minlength="6" placeholder="******">
              </div>
              <div class="mb-3">
                <label class="form-label text-secondary small">Confirm Password</label>
                <input type="password" class="form-control bg-transparent border-secondary text-white" required name="confirm_password" minlength="6" placeholder="******">
              </div>
              <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="termsAgree" name="terms" required>
                <label class="form-check-label text-secondary small" for="termsAgree">I agree to Stackly's <a href="404.html" class="text-gradient">Terms of Service</a> & <a href="404.html" class="text-gradient">Privacy Policy</a></label>
              </div>
              <button type="submit" class="btn btn-stackly-primary w-100 py-2">Sign Up Now</button>
            </form>
            
            <p class="text-center text-secondary small mt-4 mb-0">Already have an account? <a href="login.html" class="text-gradient">Log In here</a></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  

  <!-- Injected Footer -->
  <div id="footer-container"></div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Bootstrap Select -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/js/bootstrap-select.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <!-- ImagesLoaded -->
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <!-- Isotope -->
  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
  <!-- Jarallax -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jarallax/2.1.4/jarallax.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jarallax/2.1.4/jarallax-element.min.js"></script>
  <!-- jQuery Appear -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-appear/0.1.1/jquery.appear.min.js"></script>
  <!-- CircleType -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/circletype/2.3.0/circletype.min.js"></script>
  <!-- Lettering.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lettering.js/0.7.0/jquery.lettering.min.js"></script>
  <!-- Magnific Popup -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>
  <!-- jQuery Validation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  <!-- noUiSlider & wNumb -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wnumb/1.2.0/wNumb.min.js"></script>
  <!-- Owl Carousel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <!-- Slick -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
  <!-- Tiny Slider -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/min/tiny-slider.js"></script>
  <!-- flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- jquery countdown -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.countdown/2.2.0/jquery.countdown.min.js"></script>
  <!-- Custom scripts -->
  <script src="js/main.js"></script>
</body>
</html>
